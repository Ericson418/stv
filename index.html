<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
import FingerprintJS from "https://openfpcdn.io/fingerprintjs/v4";

const firebaseConfig = {
    apiKey: "AIzaSyCT8qDJS08bes2OJ0WOGinPWTBwSiTz7SA",
    authDomain: "stvoucher-a4d4b.firebaseapp.com",
    projectId: "stvoucher-a4d4b",
    storageBucket: "stvoucher-a4d4b.firebasestorage.app",
    messagingSenderId: "719882687537",
    appId: "1:719882687537:web:91e650f1297c6429eb7110"
};

const OTP = "123456";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const loginScreen = document.getElementById("loginScreen");
const voucherCard = document.getElementById("voucherCard");
const otpInput = document.getElementById("otpInput");
const verifyBtn = document.getElementById("verifyBtn");
const msg = document.getElementById("msg");

const fp = await FingerprintJS.load();
const { visitorId } = await fp.get();

const deviceRef = doc(db, "voucher", "device");

async function showVoucher() {
    loginScreen.classList.add("hidden");
    voucherCard.classList.remove("hidden");
    voucherCard.classList.add("flex");
}

// ===== Auto Login =====
try {
    const snapshot = await getDoc(deviceRef);

    if (snapshot.exists()) {
        const data = snapshot.data();

        if (data.deviceId === visitorId) {
            await showVoucher();
        }
    }
} catch (e) {
    console.error(e);
}

// ===== Verify OTP =====
verifyBtn.addEventListener("click", async () => {

    msg.textContent = "";

    if (otpInput.value.trim() !== OTP) {
        msg.textContent = "Oops! That's the wrong code.";
        return;
    }

    try {

        const snapshot = await getDoc(deviceRef);

        // First device
        if (!snapshot.exists()) {

            await setDoc(deviceRef, {
                deviceId: visitorId,
                claimedAt: new Date().toISOString(),
                userAgent: navigator.userAgent
            });

            await showVoucher();
            return;
        }

        // Same device
        if (snapshot.data().deviceId === visitorId) {

            await showVoucher();
            return;
        }

        // Different device
        msg.textContent =
            "This voucher has already been claimed on another device.";

    } catch (e) {

        console.error(e);
        msg.textContent = "Something went wrong. Please try again.";

    }

});
</script>
