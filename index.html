<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Treat for LokYee</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap');
body{font-family:'Quicksand',sans-serif;background:linear-gradient(135deg,#fdf2f8,#fae8ff);}
.pink-title{font-family:'Dancing Script',cursive;}
</style>
</head>
<body>

<div class="min-h-screen flex items-center justify-center p-4">

<div id="loginScreen" class="w-full flex justify-center">
<div class="bg-white max-w-sm w-full p-8 rounded-3xl shadow-xl">
<h1 class="pink-title text-4xl text-center text-pink-600">Special Surprise</h1>
<p class="text-center mt-3 text-gray-500">Enter the OTP I sent you.</p>

<input id="otpInput" class="w-full border rounded-xl p-3 mt-6" placeholder="OTP">
<button id="verifyBtn" class="w-full mt-4 bg-pink-500 text-white p-3 rounded-xl">Verify</button>
<p id="msg" class="text-center text-red-500 mt-3"></p>
</div>
</div>

<div id="voucherCard" class="hidden w-full justify-center">
<div class="bg-white max-w-sm w-full p-8 rounded-3xl shadow-xl border border-pink-100">
<div class="flex justify-between text-[10px] font-bold text-pink-400 mb-8 uppercase">
<div>To: <span class="text-pink-600">LokYee</span></div>
<div>From: <span class="text-pink-600">Yi Hong</span></div>
</div>

<div class="text-center mb-8">
<h2 class="text-[10px] uppercase tracking-[0.2em] text-pink-400">Exclusive Voucher</h2>
<h1 class="pink-title text-5xl text-pink-600">Special Treatment</h1>
</div>

<div class="text-center space-y-2 mb-8">
<p class="text-pink-500">Priority Treatment</p>
<p class="text-pink-500">One Meal</p>
<p class="text-pink-500">Coffee or Dessert</p>
<p class="text-pink-500">Good Company</p>
</div>

<form action="https://formspree.io/f/xvzeplnk" method="POST">
<input type="hidden" name="Voucher_Type" value="Special Treatment for LokYee">
<button class="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold">
REDEEM MY TREAT
</button>
</form>

<div class="mt-8 text-center text-[8px] text-pink-300">
Valid until you decide to use it • Non-transferable
</div>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
import FingerprintJS from "https://openfpcdn.io/fingerprintjs/v4";

const firebaseConfig={
apiKey:"AIzaSyCT8qDJS08bes2OJ0WOGinPWTBwSiTz7SA",
authDomain:"stvoucher-a4d4b.firebaseapp.com",
projectId:"stvoucher-a4d4b",
storageBucket:"stvoucher-a4d4b.firebasestorage.app",
messagingSenderId:"719882687537",
appId:"1:719882687537:web:91e650f1297c6429eb7110"
};

const OTP="686943";

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const loginScreen=document.getElementById("loginScreen");
const voucherCard=document.getElementById("voucherCard");
const verifyBtn=document.getElementById("verifyBtn");
const otpInput=document.getElementById("otpInput");
const msg=document.getElementById("msg");

const fp=await FingerprintJS.load();
const {visitorId}=await fp.get();

const deviceRef=doc(db,"voucher","device");
const snapshot=await getDoc(deviceRef);

// Auto-login for registered device
if(snapshot.exists() && snapshot.data().deviceId===visitorId){
    loginScreen.classList.add("hidden");
    voucherCard.classList.remove("hidden");
    voucherCard.classList.add("flex");
}

verifyBtn.addEventListener("click", async ()=>{

    msg.textContent="";

    if(otpInput.value.trim()!==OTP){
        msg.textContent="Oops! That's the wrong code.";
        return;
    }

    const snap=await getDoc(deviceRef);

    if(!snap.exists()){
        await setDoc(deviceRef,{
            deviceId:visitorId,
            claimedAt:new Date().toISOString(),
            userAgent:navigator.userAgent
        });
    }else if(snap.data().deviceId!==visitorId){
        msg.textContent="This voucher has already been claimed on another device.";
        return;
    }

    loginScreen.classList.add("hidden");
    voucherCard.classList.remove("hidden");
    voucherCard.classList.add("flex");
});
</script>

</body>
</html>
