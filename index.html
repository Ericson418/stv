<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Treat for LokYee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fdf2f8 0%, #fae8ff 100%);
            min-height: 100vh;
        }

        .pink-title {
            font-family: 'Dancing Script', cursive;
        }
    </style>
</head>

<body class="flex items-center justify-center p-4">
<div id="loginScreen" class="w-full flex justify-center">
        <div class="bg-white max-w-sm w-full p-8 rounded-3xl shadow-xl">
            <h1 class="pink-title text-4xl text-center text-pink-600">Special Surprise</h1>
            <p class="text-center mt-3 text-gray-500">Enter the OTP I sent you.</p>
            <input id="otpInput" class="w-full border rounded-xl p-3 mt-6" placeholder="OTP">
            <button id="verifyBtn" class="w-full mt-4 bg-pink-500 text-white p-3 rounded-xl">Verify</button>
            <p id="msg" class="text-center text-red-500 mt-3"></p>
        </div>
    </div>
    <!-- Voucher Card -->
    <div
   id="voucherCard" class="hidden bg-white max-w-sm w-full p-8 rounded-3xl shadow-[0_20px_50px_rgba(219,39,119,0.15)] border border-pink-100 relative overflow-hidden">

        <!-- Decorative elements -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-pink-100 rounded-full blur-2xl opacity-60"></div>

        <!-- To / From Section -->
        <div class="flex justify-between text-[10px] font-bold text-pink-400 mb-8 uppercase tracking-widest">
            <div>To: <span class="text-pink-600 border-b border-pink-200">LokYee</span></div>
            <div>From: <span class="text-pink-600 border-b border-pink-200">Yi Hong</span></div>
        </div>

        <div class="text-center mb-8">
            <h2 class="text-[10px] uppercase tracking-[0.2em] text-pink-400 mb-2">Exclusive Voucher</h2>
            <h1 class="pink-title text-5xl text-pink-600 leading-tight">Special Treatment</h1>
        </div>

        <!-- Centered List Section (No Animation) -->
        <div class="mb-8">
            <p class="text-[10px] text-gray-400 text-center uppercase font-bold tracking-widest mb-4">What's Included
            </p>
            <div class="text-center space-y-2">
                <p class="text-pink-500 font-medium">Priority Treatment</p>
                <p class="text-pink-500 font-medium">One Meal</p>
                <p class="text-pink-500 font-medium">Coffee or Dessert</p>

                <p class="text-pink-500 font-medium">Good Company</p>
            </div>
        </div>

        <!-- Form -->
        <form action="https://formspree.io/f/xvzeplnk" method="POST">
            <input type="hidden" name="Voucher_Type" value="Special Treatment for LokYee">
            <button type="submit"
                class="w-full bg-pink-500 text-white py-4 rounded-2xl transition-all shadow-lg shadow-pink-200 font-bold text-sm tracking-wide">
                REDEEM MY TREAT
            </button>
        </form>

        <!-- Refined Footer -->
        <div class="mt-8 text-center text-[8px] text-pink-300 uppercase tracking-tighter space-y-1">
            <p>Valid until you decide to use it • Non-transferable</p>
            <p>Subject to my availability, but I'll always try my best</p>
        </div>
    </div>
    <script type="module">
        // Add these variables at the top of your script
const loginScreen = document.getElementById('loginScreen');
const voucherCard = document.getElementById('voucherCard');
const otpInput = document.getElementById('otpInput');
const verifyBtn = document.getElementById('verifyBtn');
const msg = document.getElementById('msg');

// Button Click Event
verifyBtn.addEventListener('click', () => {
    if (otpInput.value === OTP) {
        // Correct OTP: Hide login, show voucher
        loginScreen.classList.add('hidden');
        voucherCard.classList.remove('hidden');
    } else {
        // Incorrect OTP: Show error
        msg.textContent = "Oops! That's the wrong code.";
    }
});

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
    getFirestore,
    doc,
    getDoc,
    setDoc
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

  import FingerprintJS from "https://openfpcdn.io/fingerprintjs/v4";

const firebaseConfig = {
  apiKey: "AIzaSyCT8qDJS08bes2OJ0WOGinPWTBwSiTz7SA",
  authDomain: "stvoucher-a4d4b.firebaseapp.com",
  projectId: "stvoucher-a4d4b",
  storageBucket: "stvoucher-a4d4b.firebasestorage.app",
  messagingSenderId: "719882687537",
  appId: "1:719882687537:web:91e650f1297c6429eb7110",
  measurementId: "G-5CM62PDM3Q"
};

const OTP = "123456"; 

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

 const fp = await FingerprintJS.load();
const result = await fp.get();

console.log(result.visitorId);

const deviceRef = doc(db, "voucher", "device");

const snapshot = await getDoc(deviceRef);

console.log("Document exists:", snapshot.exists());

if (snapshot.exists()) {
    console.log("Saved device:", snapshot.data().deviceId);
    console.log("Current device:", result.visitorId);
}

if (!snapshot.exists()) {

    await setDoc(deviceRef, {
        deviceId: result.visitorId,
        claimedAt: new Date().toISOString(),
        userAgent: navigator.userAgent
    });

    console.log("Device Registered");

} else {

    const savedDevice = snapshot.data().deviceId;

    if (savedDevice === result.visitorId) {

        console.log("Welcome back!");

    } else {

        document.body.innerHTML = `
            <div style="
                display:flex;
                justify-content:center;
                align-items:center;
                height:100vh;
                background:#fff5f8;
                font-family:sans-serif;
                text-align:center;
            ">
                <div>
                    <h1>This voucher has already been claimed.</h1>
                    <p>This page can only be viewed from the registered device.</p>
                </div>
            </div>
        `;

    }

}

console.log("Firebase Connected!");

</script>

</body>

</html>
